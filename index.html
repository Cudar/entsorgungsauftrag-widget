<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entsorgungsauftrag – Demo</title>
    <style>
      body {
        margin: 0;
        padding: 2rem 1rem;
        background: #eef2f6;
        font-family: system-ui, sans-serif;
      }

      .demo-header {
        max-width: 720px;
        margin: 0 auto 1rem;
      }

      pre {
        max-width: 720px;
        margin: 1.5rem auto 0;
        padding: 1rem;
        background: #111;
        color: #f5f5f5;
        border-radius: 8px;
        overflow: auto;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div class="demo-header">
      <h1>Entsorgungsauftrag Widget – Demo</h1>
      <p>Einbettbar per <code>&lt;script&gt;</code> und <code>&lt;entsorgungsauftrag-form&gt;</code></p>
    </div>

    <entsorgungsauftrag-form
      locale="de"
      address-validation="local"
      vat-validation="local"
      privacy-url="https://www.avista-oil.de/datenschutz/"
      terms-url="https://www.avista-oil.de/downloads/"
    ></entsorgungsauftrag-form>

    <pre id="output">JSON-Output erscheint hier nach dem Absenden …</pre>

    <script type="module" src="/src/index.ts"></script>
    <script type="module">
      const output = document.getElementById('output');
      document.querySelector('entsorgungsauftrag-form').addEventListener('entsorgungsauftrag:submit', (event) => {
        output.textContent = JSON.stringify(event.detail, null, 2);
      });
    </script>
  </body>
</html>
